<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BancoAPI - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">

  <div class="card shadow" style="width: 400px;">
    <div class="card-header bg-primary text-white text-center">
      <h4 class="mb-0">BancoAPI</h4>
    </div>
    <div class="card-body">
      <ul class="nav nav-tabs mb-3" id="authTabs">
        <li class="nav-item">
          <button class="nav-link active" onclick="mostrarAba('login')">Login</button>
        </li>
        <li class="nav-item">
          <button class="nav-link" onclick="mostrarAba('registro')">Cadastrar</button>
        </li>
      </ul>

      <!-- Login -->
      <div id="abaLogin">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" id="loginEmail" class="form-control" placeholder="email@email.com" />
        </div>
        <div class="mb-3">
          <label class="form-label">Senha</label>
          <input type="password" id="loginSenha" class="form-control" placeholder="Senha" />
        </div>
        <button class="btn btn-primary w-100" onclick="login()">Entrar</button>
      </div>

      <!-- Registro -->
      <div id="abaRegistro" style="display:none;">
        <div class="mb-3">
          <label class="form-label">Nome</label>
          <input type="text" id="regNome" class="form-control" placeholder="Seu nome" />
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" id="regEmail" class="form-control" placeholder="email@email.com" />
        </div>
        <div class="mb-3">
          <label class="form-label">Senha</label>
          <input type="password" id="regSenha" class="form-control" placeholder="Mínimo 6 caracteres" />
        </div>
        <button class="btn btn-success w-100" onclick="registrar()">Cadastrar</button>
      </div>

      <div id="mensagem" class="mt-3"></div>
    </div>
  </div>

  <script>
    const API = '';

    function mostrarAba(aba) {
      document.getElementById('abaLogin').style.display = aba === 'login' ? '' : 'none';
      document.getElementById('abaRegistro').style.display = aba === 'registro' ? '' : 'none';
      document.querySelectorAll('#authTabs .nav-link').forEach((el, i) => {
        el.classList.toggle('active', (i === 0 && aba === 'login') || (i === 1 && aba === 'registro'));
      });
    }

    function mostrarAlerta(msg, tipo = 'danger') {
      document.getElementById('mensagem').innerHTML =
        `<div class="alert alert-${tipo}">${msg}</div>`;
    }

    async function login() {
      const email = document.getElementById('loginEmail').value;
      const senha = document.getElementById('loginSenha').value;
      const res = await fetch(`${API}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, senha })
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('nome', data.nome);
        localStorage.setItem('perfil', data.perfil);
        window.location.href = data.perfil === 'Admin' ? '/admin.html' : '/dashboard.html';
      } else {
        mostrarAlerta(data.erro || 'Erro ao fazer login.');
      }
    }

    async function registrar() {
      const nome = document.getElementById('regNome').value;
      const email = document.getElementById('regEmail').value;
      const senha = document.getElementById('regSenha').value;
      const res = await fetch(`${API}/api/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nome, email, senha })
      });
      const data = await res.json();
      if (res.ok) {
        mostrarAlerta('Cadastro realizado! Faça login.', 'success');
        mostrarAba('login');
      } else {
        mostrarAlerta(data.erro || 'Erro ao cadastrar.');
      }
    }
  </script>
</body>
</html>
