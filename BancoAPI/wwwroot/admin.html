<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Banco Master - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">Banco Master — Admin</span>
    <span class="text-white me-3" id="nomeUsuario"></span>
    <button class="btn btn-outline-light btn-sm" onclick="logout()">Sair</button>
  </nav>

  <div class="container py-4">

    <h5>Clientes Cadastrados</h5>
    <div class="table-responsive mb-5">
      <table class="table table-bordered table-sm bg-white">
        <thead class="table-dark">
          <tr><th>ID</th><th>Nome</th><th>Email</th><th>Perfil</th><th>Contas</th><th>Ações</th></tr>
        </thead>
        <tbody id="tabelaClientes"></tbody>
      </table>
    </div>

    <h5>Todas as Contas</h5>
    <div class="table-responsive">
      <table class="table table-bordered table-sm bg-white">
        <thead class="table-dark">
          <tr><th>Nº Conta</th><th>Tipo</th><th>Saldo</th><th>Titular</th></tr>
        </thead>
        <tbody id="tabelaContas"></tbody>
      </table>
    </div>

  </div>

  <!-- Modal Editar -->
  <div class="modal fade" id="modalEditar" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Editar Cliente</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="editId" />
          <div class="mb-3">
            <label class="form-label">Nome</label>
            <input type="text" id="editNome" class="form-control" />
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" id="editEmail" class="form-control" />
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-primary" onclick="salvarEdicao()">Salvar</button>
        </div>
      </div>
    </div>
  </div>

  <div id="alerta" class="position-fixed bottom-0 end-0 p-3" style="z-index:9999"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const token = localStorage.getItem('token');
    const perfil = localStorage.getItem('perfil');
    if (!token || perfil !== 'Admin') window.location.href = '/index.html';

    document.getElementById('nomeUsuario').textContent = localStorage.getItem('nome') || '';

    const headers = () => ({
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`
    });

    function logout() {
      localStorage.clear();
      window.location.href = '/index.html';
    }

    function toast(msg, tipo = 'success') {
      document.getElementById('alerta').innerHTML =
        `<div class="alert alert-${tipo} shadow">${msg}</div>`;
      setTimeout(() => document.getElementById('alerta').innerHTML = '', 3000);
    }

    function formatarValor(v) {
      return `R$ ${parseFloat(v).toFixed(2).replace('.', ',')}`;
    }

    async function carregarClientes() {
      const res = await fetch('/api/clientes', { headers: headers() });
      const clientes = await res.json();

      const tbody = document.getElementById('tabelaClientes');
      const tContas = document.getElementById('tabelaContas');
      tbody.innerHTML = '';
      tContas.innerHTML = '';

      clientes.forEach(c => {
        tbody.innerHTML += `
          <tr>
            <td>${c.id}</td>
            <td>${c.nome}</td>
            <td>${c.email}</td>
            <td><span class="badge ${c.perfil === 'Admin' ? 'bg-dark' : 'bg-secondary'}">${c.perfil}</span></td>
            <td>${c.contas.length}</td>
            <td>
              <button class="btn btn-sm btn-primary me-1" onclick="abrirEditar(${c.id}, '${c.nome}', '${c.email}')">Editar</button>
              <button class="btn btn-sm btn-danger" onclick="excluir(${c.id})">Excluir</button>
            </td>
          </tr>`;

        c.contas.forEach(ct => {
          tContas.innerHTML += `
            <tr>
              <td>${ct.numeroConta}</td>
              <td>${ct.tipo}</td>
              <td>${formatarValor(ct.saldo)}</td>
              <td>${c.nome}</td>
            </tr>`;
        });
      });
    }

    function abrirEditar(id, nome, email) {
      document.getElementById('editId').value = id;
      document.getElementById('editNome').value = nome;
      document.getElementById('editEmail').value = email;
      new bootstrap.Modal(document.getElementById('modalEditar')).show();
    }

    async function salvarEdicao() {
      const id = document.getElementById('editId').value;
      const nome = document.getElementById('editNome').value;
      const email = document.getElementById('editEmail').value;
      const res = await fetch(`/api/clientes/${id}`, {
        method: 'PUT', headers: headers(),
        body: JSON.stringify({ nome, email })
      });
      if (res.ok) {
        bootstrap.Modal.getInstance(document.getElementById('modalEditar')).hide();
        toast('Cliente atualizado!');
        carregarClientes();
      } else {
        const data = await res.json();
        toast(data.erro || 'Erro ao atualizar.', 'danger');
      }
    }

    async function excluir(id) {
      if (!confirm('Deseja excluir este cliente?')) return;
      const res = await fetch(`/api/clientes/${id}`, { method: 'DELETE', headers: headers() });
      if (res.ok) { toast('Cliente excluído!'); carregarClientes(); }
      else { const data = await res.json(); toast(data.erro || 'Erro ao excluir.', 'danger'); }
    }

    carregarClientes();
  </script>
</body>
</html>
