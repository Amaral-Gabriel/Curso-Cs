<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Banco Master - Painel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-primary px-3">
    <span class="navbar-brand">Banco Master</span>
    <span class="text-white me-3" id="nomeUsuario"></span>
    <button class="btn btn-outline-light btn-sm" onclick="logout()">Sair</button>
  </nav>

  <div class="container py-4">

    <!-- Contas -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5>Minhas Contas</h5>
      <button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#modalNovaConta">+ Nova Conta</button>
    </div>
    <div id="listaContas" class="row mb-4"></div>

    <!-- Operações -->
    <div class="row g-3 mb-4">

      <!-- Depósito -->
      <div class="col-md-4">
        <div class="card">
          <div class="card-header bg-success text-white">Depósito</div>
          <div class="card-body">
            <select id="depContaId" class="form-select mb-2"></select>
            <input type="number" id="depValor" class="form-control mb-2" placeholder="Valor (R$)" min="0.01" step="0.01" />
            <button class="btn btn-success w-100" onclick="depositar()">Depositar</button>
          </div>
        </div>
      </div>

      <!-- Saque -->
      <div class="col-md-4">
        <div class="card">
          <div class="card-header bg-warning">Saque</div>
          <div class="card-body">
            <select id="saqContaId" class="form-select mb-2"></select>
            <input type="number" id="saqValor" class="form-control mb-2" placeholder="Valor (R$)" min="0.01" step="0.01" />
            <small class="text-muted d-block mb-2">Conta Corrente cobra taxa de R$2,50</small>
            <button class="btn btn-warning w-100" onclick="sacar()">Sacar</button>
          </div>
        </div>
      </div>

      <!-- PIX -->
      <div class="col-md-4">
        <div class="card">
          <div class="card-header bg-info text-white">PIX</div>
          <div class="card-body">
            <select id="pixContaId" class="form-select mb-2"></select>
            <input type="text" id="pixDestino" class="form-control mb-2" placeholder="Número da conta destino" />
            <input type="number" id="pixValor" class="form-control mb-2" placeholder="Valor (R$)" min="0.01" step="0.01" />
            <button class="btn btn-info text-white w-100" onclick="pix()">Enviar PIX</button>
          </div>
        </div>
      </div>

    </div>

    <div id="alertaOp" class="mb-3"></div>

    <!-- Extrato -->
    <h5>Extrato</h5>
    <select id="extratoContaId" class="form-select mb-2" style="max-width: 300px;" onchange="carregarExtrato()"></select>
    <div class="table-responsive">
      <table class="table table-bordered table-sm bg-white">
        <thead class="table-dark">
          <tr>
            <th>Tipo</th><th>Valor</th><th>Destino</th><th>Data/Hora</th>
          </tr>
        </thead>
        <tbody id="tabelaExtrato"></tbody>
      </table>
    </div>

  </div>

  <!-- Modal Nova Conta -->
  <div class="modal fade" id="modalNovaConta" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Abrir Nova Conta</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <select id="novaTipo" class="form-select">
            <option value="Corrente">Conta Corrente (taxa de saque R$2,50)</option>
            <option value="Poupanca">Conta Poupança (rende 0,5% ao dia)</option>
          </select>
        </div>
        <div class="modal-footer">
          <button class="btn btn-success" onclick="abrirConta()">Abrir</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/index.html';

    document.getElementById('nomeUsuario').textContent = localStorage.getItem('nome') || '';

    const headers = () => ({
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`
    });

    function logout() {
      localStorage.clear();
      window.location.href = '/index.html';
    }

    function mostrarAlerta(msg, tipo = 'danger') {
      document.getElementById('alertaOp').innerHTML = `<div class="alert alert-${tipo} alert-dismissible"><button type="button" class="btn-close" data-bs-dismiss="alert"></button>${msg}</div>`;
    }

    async function tratarErro(res) {
      if (res.status === 401) return 'Sessão expirada. Faça login novamente.';
      if (res.status === 403) return 'Acesso negado.';
      if (res.status === 404) { const d = await res.json(); return d.erro || 'Recurso não encontrado.'; }
      if (res.status === 400) { const d = await res.json(); return d.erro || 'Dados inválidos.'; }
      return 'Erro inesperado. Tente novamente.';
    }

    function formatarValor(v) {
      return `R$ ${parseFloat(v).toFixed(2).replace('.', ',')}`;
    }

    async function carregarContas() {
      const res = await fetch('/api/contas', { headers: headers() });
      if (!res.ok) { logout(); return; }
      const contas = await res.json();

      const lista = document.getElementById('listaContas');
      const selects = ['depContaId', 'saqContaId', 'pixContaId', 'extratoContaId'];
      selects.forEach(id => document.getElementById(id).innerHTML = '');
      lista.innerHTML = '';

      contas.forEach(c => {
        lista.innerHTML += `
          <div class="col-md-4 mb-2">
            <div class="card border-primary">
              <div class="card-body">
                <h6>${c.tipo === 'Corrente' ? 'Conta Corrente' : 'Conta Poupança'}</h6>
                <p class="mb-1 text-muted">Nº ${c.numeroConta}</p>
                <h5 class="text-primary">${formatarValor(c.saldo)}</h5>
                ${c.tipo === 'Corrente' ? `<small class="text-muted">Taxa saque: R$2,50</small>` : `<small class="text-muted">Juros: 0,5%/dia</small>`}
              </div>
            </div>
          </div>`;
        const opt = `<option value="${c.id}">Nº ${c.numeroConta} (${c.tipo}) - ${formatarValor(c.saldo)}</option>`;
        selects.forEach(id => document.getElementById(id).innerHTML += opt);
      });

      carregarExtrato();
    }

    async function carregarExtrato() {
      const contaId = document.getElementById('extratoContaId').value;
      if (!contaId) return;
      const res = await fetch(`/api/transacoes/${contaId}`, { headers: headers() });
      const transacoes = await res.json();
      const tbody = document.getElementById('tabelaExtrato');
      if (!transacoes.length) { tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">Sem transações</td></tr>'; return; }
      tbody.innerHTML = transacoes.map(t => `
        <tr>
          <td><span class="badge ${t.tipo === 'Deposito' ? 'bg-success' : t.tipo === 'Saque' ? 'bg-warning text-dark' : 'bg-info'}">${t.tipo}</span></td>
          <td>${formatarValor(t.valor)}</td>
          <td>${t.contaDestino || '-'}</td>
          <td>${new Date(t.dataHora).toLocaleString('pt-BR')}</td>
        </tr>`).join('');
    }

    async function depositar() {
      const contaId = parseInt(document.getElementById('depContaId').value);
      const valor = parseFloat(document.getElementById('depValor').value);
      const res = await fetch('/api/transacoes/deposito', {
        method: 'POST', headers: headers(),
        body: JSON.stringify({ contaId, valor })
      });
      if (res.ok) { mostrarAlerta(`Depósito de ${formatarValor(valor)} realizado!`, 'success'); carregarContas(); }
      else mostrarAlerta(await tratarErro(res));
    }

    async function sacar() {
      const contaId = parseInt(document.getElementById('saqContaId').value);
      const valor = parseFloat(document.getElementById('saqValor').value);
      const res = await fetch('/api/transacoes/saque', {
        method: 'POST', headers: headers(),
        body: JSON.stringify({ contaId, valor })
      });
      if (res.ok) { mostrarAlerta(`Saque de ${formatarValor(valor)} realizado!`, 'success'); carregarContas(); }
      else mostrarAlerta(await tratarErro(res));
    }

    async function pix() {
      const contaOrigemId = parseInt(document.getElementById('pixContaId').value);
      const numeroContaDestino = document.getElementById('pixDestino').value.trim();
      const valor = parseFloat(document.getElementById('pixValor').value);
      const res = await fetch('/api/transacoes/pix', {
        method: 'POST', headers: headers(),
        body: JSON.stringify({ contaOrigemId, numeroContaDestino, valor })
      });
      if (res.ok) { mostrarAlerta(`PIX de ${formatarValor(valor)} enviado!`, 'success'); carregarContas(); }
      else mostrarAlerta(await tratarErro(res));
    }

    async function abrirConta() {
      const tipo = document.getElementById('novaTipo').value;
      const res = await fetch('/api/contas', {
        method: 'POST', headers: headers(),
        body: JSON.stringify({ tipo })
      });
      if (res.ok) {
        bootstrap.Modal.getInstance(document.getElementById('modalNovaConta')).hide();
        mostrarAlerta('Conta aberta com sucesso!', 'success');
        carregarContas();
      } else {
        mostrarAlerta(await tratarErro(res));
      }
    }

    carregarContas();
  </script>
</body>
</html>
